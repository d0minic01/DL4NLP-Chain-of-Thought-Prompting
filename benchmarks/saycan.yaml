tag:
  - planning
dataset_path: chiayewken/saycan
test_split: test
doc_to_text: "{{INPUT}}"
doc_to_target: "{{OUTPUT}}"
fewshot_config:
  doc_to_text: "{{question}}"
  doc_to_target: "{{chain_of_thought}} The answer is {{target}}."
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
generation_kwargs:
  until:
    - "Question:"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
filter_list:
  - name: "strict-match"
    filter:
      - function: "regex"
        regex_pattern: "The answer is ([\\s\\S]+?)(?:\\.?\\s*$|$)"
      - function: "take_first"
  - name: "flexible-extract"
    filter:
      - function: "regex"
        group_select: 0
        regex_pattern: "(?s)((?:robot\\.pick_and_place\\([^)]+\\)\\n)+done\\(\\))"
      - function: "take_first"
