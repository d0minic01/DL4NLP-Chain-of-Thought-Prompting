tag:
  - commonsense_reasoning
dataset_path: ChilleD/strategyqa
test_split: test
doc_to_text: "{{question}}"
doc_to_target: "{{ 'yes' if answer else 'no' }}"
fewshot_config:
  doc_to_text: "{{question}}"
  doc_to_target: "{{chain_of_thought}} The answer is {{target}}."
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
generation_kwargs:
  until:
    - "Question:"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
filter_list:
  - name: "strict-match"
    filter:
      - function: "regex"
        regex_pattern: "The answer is (yes|no)"
      - function: "take_first"
  - name: "flexible-extract"
    filter:
      - function: "regex"
        group_select: -1
        regex_pattern: "(?i)\\b(yes|no)\\b"
      - function: "take_first"
