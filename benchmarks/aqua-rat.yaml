tag:
  - math_word_problems
dataset_path: deepmind/aqua_rat
doc_to_text: "{{question}}\nAnswer Choices: {% for opt in options %}({{ opt[:1] | lower }}) {{ opt[2:] }}{% if not loop.last %} {% endif %}{% endfor %}"
doc_to_target: "{{correct | lower}}"
test_split: train
fewshot_config:
  doc_to_text: "{{question}}"
  doc_to_target: "{{chain_of_thought}} The answer is {{target}}."
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: false
    regexes_to_ignore:
      - ","
      - "\\$"
      - "(?s).*#### "
      - "\\.$"
generation_kwargs:
  until:
    - "Question:"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
filter_list:
  - name: "strict-match"
    filter:
      - function: "regex"
        regex_pattern: "[Tt]he answer is \\(([a-e])\\)"
      - function: "take_first"
  - name: "flexible-extract"
    filter:
      - function: "regex"
        group_select: -1
        regex_pattern: "\\(([a-e])\\)"
      - function: "take_first"
