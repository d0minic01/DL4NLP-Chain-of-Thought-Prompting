tag:
  - symbolic_reasoning
dataset_path: json
dataset_kwargs:
  data_files:
    test: data/letter_shift_test.jsonl
test_split: test
output_type: generate_until
doc_to_text: "Question: {{question}}\nAnswer:"
doc_to_target: "{{target}}"
fewshot_config:
  doc_to_text: "Question: {{question}}\nAnswer:"
  doc_to_target: "{{chain_of_thought}} The answer is {{target}}."
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: false
generation_kwargs:
  until:
    - "Question:"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
repeats: 1
filter_list:
  - name: "strict-match"
    filter:
      - function: "regex"
        regex_pattern: "The answer is ([a-z])\\."
      - function: "take_first"
  - name: "flexible-extract"
    filter:
      - function: "regex"
        group_select: -1
        regex_pattern: "\\b([a-z])\\b"
      - function: "take_first"
