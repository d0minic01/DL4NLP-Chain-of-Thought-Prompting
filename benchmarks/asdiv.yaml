task: asdiv
dataset_path: EleutherAI/asdiv
output_type: generate_until
validation_split: validation
fewshot_split: train
doc_to_text: "{{body | default('')}} Question: {{question}}\nAnswer:"
doc_to_target: "{{answer.split(' (')[0]}}"
fewshot_config:
  doc_to_text: "Question: {{question}}\nAnswer:"
  doc_to_target: "{{chain_of_thought}} The answer is {{target}}."
should_decontaminate: true
doc_to_decontamination_query: "{{body | default('')}} {{question}}"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: false
    regexes_to_ignore:
      - ","
      - "\\$"
      - "(?s).*#### "
      - "\\.$"
generation_kwargs:
  until:
    - "Question:"
    - "</s>"
    - "<|im_end|>"
  do_sample: false
  temperature: 0.0
repeats: 1
num_fewshot: 5
filter_list:
  - name: "strict-match"
    filter:
      - function: "regex"
        regex_pattern: "The answer is (\\-?[0-9\\.\\,]+)."
      - function: "take_first"
  - name: "flexible-extract"
    filter:
      - function: "regex"
        group_select: -1
        regex_pattern: "(-?[$0-9.,]{2,})|(-?[0-9]+)"
      - function: "take_first"
