# =============================================================================
# Benchmark Evaluation Configuration вЂ” RTX 5090 / ~$5 run
# =============================================================================
# 13 models selected across 4 families, covering 135M в†’ 9B parameter range.
# Run with: uv run eval -c benchmarks_rtx5090.yaml -l 100
# Estimated time: ~8.5 hours | Estimated cost: ~$5.00
#
# limit field: integer to cap examples for fast testing, null for full dataset
# task: filename (without .yaml) of the benchmark config in benchmarks/
# cot_benchmark: (optional) override the directory name in fewshots_and_cots/
#
# All benchmarks automatically use all techniques defined in cot_techniques below.
# Techniques whose .jsonl files are missing are skipped with a warning.

# =============================================================================
# Prompting Techniques
# =============================================================================
# type: zero_shot   вЂ” no examples, appends instruction to prompt if non-empty
# type: fewshot_base вЂ” few-shot with answer-only targets (no chain-of-thought)
# type: fewshot_cot  вЂ” few-shot with chain-of-thought reasoning in targets
#                      (requires a <technique>.jsonl file per benchmark;
#                       skipped with a warning if the file is missing)

cot_techniques:
  true_baseline:
    type: zero_shot
  think_step_by_step:
    type: zero_shot
    instruction: "Think step by step."
  fewshot_baseline:
    type: fewshot_base
  paper_cot:
    type: fewshot_cot
  persona_cot:
    type: fewshot_cot
  contrastive_cot:
    type: fewshot_cot
  numbered_step_cot:
    type: fewshot_cot
  equation_only:
    type: fewshot_cot
  caveman_mode:
    type: fewshot_cot

# =============================================================================
# Benchmarks
# =============================================================================

benchmarks:
  # в”Ђв”Ђ Arithmetic Reasoning в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  gsm8k:
    task: gsm8k
    limit: null

  asdiv:
    task: asdiv
    limit: null

  mawps:
    task: mawps
    limit: null

  svamp:
    task: svamp
    limit: null

  aqua:
    task: aqua-rat
    limit: null

  # в”Ђв”Ђ Commonsense Reasoning в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  csqa:
    task: commonsense_qa
    limit: null

  strategyqa:
    task: strategyqa
    limit: null
    cot_benchmark: strategy_qa

  sports:
    task: sports_understanding
    limit: null
    cot_benchmark: sports_understanding

  date:
    task: date_understanding
    limit: null
    cot_benchmark: date_understanding

  # в”Ђв”Ђ Symbolic Reasoning в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  coin_flip:
    task: coin_flip
    limit: null

  last_letter:
    task: last_letter_concatenation
    limit: null
    cot_benchmark: last_letter_concatenation

  letter_shift:
    task: letter_shift
    limit: null

  # в”Ђв”Ђ Planning (SayCan) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  saycan:
    task: saycan
    limit: null

# =============================================================================
# Models вЂ” 13 selected, ~$5 on RTX 5090 at -l 100
# =============================================================================
# Family         | Models               | Size range  | Cost
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# SmolLM2        | 135M, 360M, 1.7B     | tinyв†’small  | $0.52
# Qwen2.5        | 0.5B, 1.5B, 3B, 7B   | tinyв†’large  | $1.32
# Gemma-4        | E2B, E4B             | smallв†’medium| $0.69
# Gemma-3        | 270m, 1b, 4b         | tinyв†’medium | $0.75
# Gemma-2        | 9b                   | large       | $0.84
# Falcon3        | 1B                   | small       | $0.16
# OLMo-2         | 1B                   | small       | $0.19
# в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
#                                         TOTAL        ~$4.47

models:
  defaults:
    batch_size: null
    apply_chat_template: true
    system_instruction: "Always end your response with: The answer is <your answer>."
    model_args:
      attn_implementation: flash_attention_2
      dtype: bfloat16

  # в”Ђв”Ђ SmolLM2 (135M в†’ 1.7B) вЂ” DONE, results saved, skipping в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
