# =============================================================================
# Benchmark Evaluation Configuration
# =============================================================================
# limit field: integer to cap examples for fast testing, null for full dataset
# task: filename (without .yaml) of the benchmark config in benchmarks/
# prompt_set: filename (without .jsonl) of the few-shot examples in fewshots_and_cots/

# =============================================================================
# Arithmetic Reasoning
# =============================================================================
benchmarks:
  gsm8k:
    task: gsm8k
    limit: null
    prompt_set: math_word_problems

  asdiv:
    task: asdiv
    limit: null
    prompt_set: math_word_problems

  mawps:
    task: mawps
    limit: null
    prompt_set: math_word_problems

  svamp:
    task: svamp
    limit: null
    prompt_set: math_word_problems

  aqua:
    task: aqua-rat
    limit: null
    prompt_set: math_word_problems_aqua

  # =============================================================================
  # Commonsense Reasoning
  # =============================================================================

  csqa:
    task: commonsense_qa
    limit: null
    prompt_set: csqa

  strategyqa:
    task: strategyqa
    limit: null
    prompt_set: strategy_qa

  sports:
    task: sports_understanding
    limit: null
    prompt_set: sports_understanding

  # =============================================================================
  # Symbolic Reasoning  (local synthetic datasets)
  # =============================================================================

  coin_flip:
    task: coin_flip
    limit: null
    prompt_set: coin_flip

  last_letter:
    task: last_letter_concatenation
    limit: null
    prompt_set: last_letter_concatenation

  date:
    task: date_understanding
    limit: null
    prompt_set: date_understanding

  letter_shift:
    task: letter_shift
    limit: null
    prompt_set: letter_shift

# =============================================================================
# Models
# =============================================================================

models:
  defaults:
    batch_size: null

  # ── Flan-T5 (encoder-decoder, instruction-tuned) ──────────────────────────
  # Context Size of 512 is too small for most of our benchmarks
  # ──────────────────────────────────────────────────────────────────────────
  # google/flan-t5-small:
  #   type: hf
  #   batch_size: 32

  # google/flan-t5-base:
  #   type: hf
  #   batch_size: 16

  # google/flan-t5-large:
  #   type: hf
  #   batch_size: 8

  # ── SmolLM2 (tiny decoder-only) ───────────────────────────────────────────
  HuggingFaceTB/SmolLM2-135M-Instruct:
    type: hf
    batch_size: 32

  HuggingFaceTB/SmolLM2-360M-Instruct:
    type: hf
    batch_size: 16

  HuggingFaceTB/SmolLM2-1.7B-Instruct:
    type: hf
    batch_size: 8

  # ── Qwen2.5-Instruct ──────────────────────────────────────────────────────
  Qwen/Qwen2.5-0.5B-Instruct:
    type: hf
    batch_size: 16

  Qwen/Qwen2.5-1.5B-Instruct:
    type: hf
    batch_size: 8

  Qwen/Qwen2.5-3B-Instruct:
    type: hf
    batch_size: 4

  Qwen/Qwen2.5-7B-Instruct:
    type: hf
    batch_size: 2

  # ── Qwen3 (generational comparison with Qwen2.5 above) ───────────────────
  # Qwen3 unifies thinking/non-thinking in one model; no separate -Instruct variant
  Qwen/Qwen3-0.6B:
    type: hf
    batch_size: 16

  Qwen/Qwen3-1.7B:
    type: hf
    batch_size: 8

  Qwen/Qwen3-4B:
    type: hf
    batch_size: 4

  # ── Gemma 4 ───────────────────────────────────────────────────────────────
  # E2B / E4B: "Edge" variants — compact dense models for on-device deployment
  # -it: instruction-tuned (SFT + RLHF), the chat/assistant variant
  # 26B MoE excluded; does not fit on 11GB VRAM
  google/gemma-4-E2B-it:
    type: hf
    batch_size: 8

  google/gemma-4-E4B-it:
    type: hf
    batch_size: 4

  # ── Gemma 3 ───────────────────────────────────────────────────────────────
  google/gemma-3-270m-it:
    type: hf
    batch_size: 16

  google/gemma-3-1b-it:
    type: hf
    batch_size: 8

  google/gemma-3-4b-it:
    type: hf
    batch_size: 4

  # ── Gemma 2 ───────────────────────────────────────────────────────────────
  google/gemma-2-2b-it:
    type: hf
    batch_size: 4

  google/gemma-2-9b-it:
    type: hf
    batch_size: 1

  # ── Phi ───────────────────────────────────────────────────────────────────
  microsoft/Phi-3-mini-4k-instruct:
    type: hf
    batch_size: 4

  microsoft/Phi-4-mini-instruct:
    type: hf
    batch_size: 4

  # ── DeepSeek-R1-Distill (reasoning-specialized) ───────────────────────────
  deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B:
    type: hf
    batch_size: 8

  deepseek-ai/DeepSeek-R1-Distill-Qwen-7B:
    type: hf
    batch_size: 2

  # ── Llama 3.2 (Meta, 128K context) ───────────────────────────────────────
  meta-llama/Llama-3.2-1B-Instruct:
    type: hf
    batch_size: 16

  meta-llama/Llama-3.2-3B-Instruct:
    type: hf
    batch_size: 4

  # ── Falcon3 (pruned+healed from larger models, math/STEM focus) ──────────
  tiiuae/Falcon3-1B-Instruct:
    type: hf
    batch_size: 16

  tiiuae/Falcon3-3B-Instruct:
    type: hf
    batch_size: 4

  # ── OLMo-2 (Allen AI, open-science, RLVR-trained) ────────────────────────
  allenai/OLMo-2-0425-1B-Instruct:
    type: hf
    batch_size: 16

  # ── Ministral (Mistral edge model, 128K context) ──────────────────────────
  mistralai/Ministral-3B-Instruct-2410:
    type: hf
    batch_size: 4
