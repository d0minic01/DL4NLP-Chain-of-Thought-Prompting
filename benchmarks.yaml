# =============================================================================
# Benchmark Evaluation Configuration
# =============================================================================
# limit field can be set to an integer to limit number of examples for faster testing -> set to null to run on full dataset

benchmarks:
  gsm8k:
    task: gsm8k
    enabled: true
    num_fewshot: 5
    limit: 2

  asdiv:
    task: asdiv
    enabled: true
    num_fewshot: 5
    limit: 2
    cot_overrides:
      output_type: generate_until
      doc_to_text: "Given the following problem, reason and give a final answer.\nProblem: {{body}} {{question}}\nSolution:"
      generation_kwargs:
        do_sample: false
        until:
          - "Problem:"
          - "</s>"
      filter_list:
        - name: "strict-match"
          filter:
            - function: regex
              regex_pattern: "The final answer is\\s*(-?\\d+\\.?\\d*)"
            - function: take_first
        - name: "flexible-extract"
          filter:
            - function: regex
              group_select: -1
              regex_pattern: "(-?[$0-9.,]{2,})|(-?[0-9]+)"
            - function: take_first

  csqa:
    task: commonsense_qa
    enabled: true
    num_fewshot: 5
    limit: 2
    cot_overrides:
      output_type: generate_until
      generation_kwargs:
        do_sample: false
        until:
          - "Question:"
          - "</s>"
      filter_list:
        - name: "strict-match"
          filter:
            - function: regex
              regex_pattern: "the answer is ([A-E])"
            - function: take_first
        - name: "flexible-extract"
          filter:
            - function: regex
              regex_pattern: "\\b([A-E])\\b"
            - function: take_first

# here we can add more benchmark defitions, although we need to specify their path / content

