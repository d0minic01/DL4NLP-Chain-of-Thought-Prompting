# =============================================================================
# Benchmark Evaluation Configuration
# =============================================================================
# limit field: integer to cap examples for fast testing, null for full dataset
# task: filename (without .yaml) of the benchmark config in benchmarks/
# cot_benchmark: (optional) override the directory name in fewshots_and_cots/
#
# All benchmarks automatically use all techniques defined in cot_techniques below.
# Techniques whose .jsonl files are missing are skipped with a warning.

# =============================================================================
# Prompting Techniques
# =============================================================================
# type: zero_shot   — no examples, appends instruction to prompt if non-empty
# type: fewshot_base — few-shot with answer-only targets (no chain-of-thought)
# type: fewshot_cot  — few-shot with chain-of-thought reasoning in targets
#                      (requires a <technique>.jsonl file per benchmark;
#                       skipped with a warning if the file is missing)

cot_techniques:
  true_baseline:
    type: zero_shot
  think_step_by_step:
    type: zero_shot
    instruction: "Think step by step."
  fewshot_baseline:
    type: fewshot_base
  paper_cot:
    type: fewshot_cot
  persona_cot:
    type: fewshot_cot
  contrastive_cot:
    type: fewshot_cot
  numbered_step_cot:
    type: fewshot_cot
  equation_only:
    type: fewshot_cot
  caveman_mode:
    type: fewshot_cot

# =============================================================================
# Benchmarks
# =============================================================================

benchmarks:
  # ── Arithmetic Reasoning ─────────────────────────────────────────────────
  gsm8k:
    task: gsm8k
    limit: null

  asdiv:
    task: asdiv
    limit: null

  mawps:
    task: mawps
    limit: null

  svamp:
    task: svamp
    limit: null

  aqua:
    task: aqua-rat
    limit: null

  # ── Commonsense Reasoning ────────────────────────────────────────────────
  csqa:
    task: commonsense_qa
    limit: null

  strategyqa:
    task: strategyqa
    limit: null
    cot_benchmark: strategy_qa

  sports:
    task: sports_understanding
    limit: null
    cot_benchmark: sports_understanding

  date:
    task: date_understanding
    limit: null
    cot_benchmark: date_understanding

  # ── Symbolic Reasoning ───────────────────────────────────────────────────
  coin_flip:
    task: coin_flip
    limit: null

  last_letter:
    task: last_letter_concatenation
    limit: null
    cot_benchmark: last_letter_concatenation

  letter_shift:
    task: letter_shift
    limit: null

  # ── Planning (SayCan) ─────────────────────────────────────────────────────
  saycan:
    task: saycan
    limit: null

# =============================================================================
# Models
# =============================================================================

models:
  defaults:
    batch_size: null
    apply_chat_template: true
    system_instruction: "Always end your response with: The answer is <your answer>."

  # ── SmolLM2  ───────────────────────────────────────────
  HuggingFaceTB/SmolLM2-135M-Instruct:
    type: hf
    batch_size: 32

  HuggingFaceTB/SmolLM2-360M-Instruct:
