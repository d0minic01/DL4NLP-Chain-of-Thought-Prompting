# =============================================================================
# Benchmark Evaluation Configuration
# =============================================================================
# limit field: integer to cap examples for fast testing, null for full dataset
# task: filename (without .yaml) of the benchmark config in benchmarks/
# cot_techniques: list of techniques to evaluate (must be defined in cot_techniques)
# cot_benchmark: (optional) override the directory name in fewshots_and_cots/

# TODO: None and ZeroShot dont adhere to benchmark result specifications

# =============================================================================
# CoT Techniques
# =============================================================================
# type: none     — baseline, no chain of thought
# type: zero_shot — no examples, appends instruction to prompt
# type: fewshot  — few-shot examples with chain of thought from {benchmark}/{technique}.jsonl

cot_techniques:
  none:
    type: none
  zero_shot:
    type: zero_shot
    instruction: "Let's think step by step."
  persona_cot:
    type: fewshot
  contrastive_cot:
    type: fewshot
  numbered_step_cot:
    type: fewshot
  equation_only:
    type: fewshot
  caveman_mode:
    type: fewshot

# =============================================================================
# Benchmarks
# =============================================================================

benchmarks:
  # ── Arithmetic Reasoning ─────────────────────────────────────────────────
  gsm8k:
    task: gsm8k
    limit: 5
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  asdiv:
    task: asdiv
    limit: 5
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  mawps:
    task: mawps
    limit: 5
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  svamp:
    task: svamp
    limit: 5
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  aqua:
    task: aqua-rat
    limit: 5
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  # ── Commonsense Reasoning ────────────────────────────────────────────────
  csqa:
    task: commonsense_qa
    limit: 5
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  strategyqa:
    task: strategyqa
    limit: 5
    cot_benchmark: strategy_qa
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  sports:
    task: sports_understanding
    limit: 5
    cot_benchmark: sports_understanding
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  # ── Symbolic Reasoning ───────────────────────────────────────────────────
  coin_flip:
    task: coin_flip
    limit: 5
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  last_letter:
    task: last_letter_concatenation
    limit: 5
    cot_benchmark: last_letter_concatenation
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  date:
    task: date_understanding
    limit: 5
    cot_benchmark: date_understanding
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

  letter_shift:
    task: letter_shift
    limit: 5
    cot_techniques:
      [none, zero_shot, persona_cot, contrastive_cot]

